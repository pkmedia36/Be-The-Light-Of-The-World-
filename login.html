<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | Be The Light Of The World Church</title>

<meta name="description" content="Create your account and join Be The Light Of The World Church digital ministry platform.">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(120deg, #0d6efd, #4f46e5);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* SIGNUP CARD */
.signup-box {
    width: 100%;
    max-width: 450px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    animation: fadeUp 1s ease;
}

/* ANIMATION */
@keyframes fadeUp {
    from {opacity:0; transform: translateY(40px);}
    to {opacity:1; transform: translateY(0);}
}

/* INPUTS */
.form-control {
    border-radius: 10px;
    padding: 12px;
}

/* BUTTON */
.btn-signup {
    width: 100%;
    background: #0d6efd;
    color: white;
    padding: 12px;
    border-radius: 50px;
    border: none;
    transition: 0.3s;
}

.btn-signup:hover {
    transform: scale(1.05);
}

/* ERROR TEXT */
.error {
    color: red;
    font-size: 13px;
    display: none;
}

/* LINKS */
a {
    text-decoration: none;
}

/* NAV MINI */
.top-links {
    text-align: center;
    margin-bottom: 15px;
}

.top-links a {
    margin: 0 8px;
    color: #0d6efd;
    font-weight: 500;
}

</style>

</head>

<body>

<!-- SIGNUP FORM -->
<div class="signup-box">

<div class="top-links">
<a href="index.html">Home</a>
<a href="features.html">Features</a>
<a href="how-it-works.html">How It Works</a>
<a href="careers.html">Careers</a>
</div>

<h3 class="text-center fw-bold"> Create Account</h3>
<p class="text-center text-muted">Join the global church community</p>

<!-- NAME -->
<div class="mb-3">
<input type="text" id="name" class="form-control" placeholder="Full Name">
</div>

<!-- EMAIL -->
<div class="mb-3">
<input type="email" id="email" class="form-control" placeholder="Email Address">
</div>

<!-- PASSWORD -->
<div class="mb-3">
<input type="password" id="password" class="form-control" placeholder="Password">
</div>

<!-- CONFIRM PASSWORD -->
<div class="mb-2">
<input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
<div id="error" class="error">Passwords do not match</div>
</div>

<!-- SIGN UP BUTTON -->
<button class="btn-signup mt-3" onclick="validateForm()">Create Account</button>

<!-- LOGIN LINK -->
<p class="text-center mt-3">
Already have an account? <a href="login.html">Login</a>
</p>

</div>

<!-- SCRIPT -->
<script>

function validateForm() {

let password = document.getElementById("password").value;
let confirm = document.getElementById("confirmPassword").value;
let error = document.getElementById("error");

if (password !== confirm) {
    error.style.display = "block";
} else {
    error.style.display = "none";
    alert("Account created successfully! Welcome to Light Church.");
    window.location.href = "login.html";
}

}

</script>

</body>
</html>
